<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
    <div layout:fragment="content" class="container mt-4">
        <div class="container" style="max-width: 600px;">
                <form th:action="@{/admin/save}" th:object="${equipment}" method="post" class="mt-4" enctype="multipart/form-data">
                    <div class="form-group">
                        <label>Tên thiết bị:</label>
                        <input type="text" th:field="*{name}" class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="font-weight-bold">Ảnh :</label>
                        <input type="file" name="fileImage" class="form-control-file border p-1 rounded">
                        <div th:if="${equipment.image != null}" class="mt-2 text-center">
                            <p class="small text-muted mb-1">Ảnh hiện tại:</p>
                            <img th:src="@{'/display-images/' + ${equipment.image}}"
                                 class="img-thumbnail shadow-sm" style="height: 100px;">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Loại (Type):</label>
                        <input type="text" th:field="*{type}" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Số lượng tồn kho:</label>
                        <input type="number" th:field="*{stock}" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-primary">Lưu lại</button>
                    <a th:href="@{/admin/inventory}" class="btn btn-secondary">Hủy bỏ</a>
                </form>
            </div>
    </div>
<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
