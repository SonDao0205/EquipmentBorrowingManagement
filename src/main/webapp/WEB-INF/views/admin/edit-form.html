<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Chỉnh sửa thiết bị IT</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
        }

        /* Card container mềm mại */
        .form-card {
            background-color: #ffffff;
            border-radius: 30px;
            padding: 45px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            border: none;
            margin-top: 3rem;
            margin-bottom: 3rem;
            transition: transform 0.3s ease;
        }

        h2 {
            color: #2d3436;
            font-weight: 800;
            font-size: 28px;
            letter-spacing: -1px;
            margin-bottom: 30px;
        }

        label {
            font-weight: 600;
            color: #636e72;
            font-size: 14px;
            margin-bottom: 8px;
            margin-left: 5px;
        }

        /* Input style hiện đại */
        .form-control {
            border-radius: 15px;
            padding: 12px 18px;
            border: 2px solid #f1f3f5;
            background-color: #f8f9fa;
            font-size: 15px;
            transition: all 0.3s ease;
            height: auto;
        }

        .form-control:focus {
            background-color: #ffffff;
            border-color: #a29bfe;
            box-shadow: 0 0 0 4px rgba(162, 155, 254, 0.15);
            outline: none;
        }

        /* Tinh chỉnh input file */
        .form-control-file {
            background: #ffffff;
            padding: 10px;
            border-radius: 15px;
            border: 2px dashed #dfe6e9;
            cursor: pointer;
        }

        /* Hiển thị lỗi tinh tế */
        .error {
            background-color: #fff5f5;
            color: #ff7675;
            padding: 8px 15px;
            border-radius: 12px;
            font-size: 12px;
            margin-top: 8px;
            display: block;
            border-left: 4px solid #ff7675;
            font-weight: 500;
        }

        /* Nút bấm Gradient */
        .btn-save {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white !important;
            border: none;
            border-radius: 15px;
            padding: 12px 30px;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.4);
            filter: brightness(1.1);
        }

        .btn-cancel {
            background-color: #f1f3f5;
            color: #636e72 !important;
            border-radius: 15px;
            padding: 12px 30px;
            font-weight: 600;
            border: none;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .btn-cancel:hover {
            background-color: #e2e6ea;
            color: #2d3436 !important;
        }

        .section-icon {
            color: #6c5ce7;
            margin-right: 12px;
        }
    </style>
</head>
<body>
<div layout:fragment="content" class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
            <div class="form-card">
                <h2><i class="bi bi-pencil-square section-icon"></i>Cập nhật thông tin thiết bị</h2>

                <form th:action="@{/admin/save}" th:object="${equipment}" method="post" enctype="multipart/form-data">
                    <div class="row">
                        <div class="col-md-12">
                            <div class="form-group mb-4">
                                <label><i class="bi bi-tag mr-1"></i> Tên thiết bị</label>
                                <input type="text" th:field="*{name}" class="form-control" placeholder="Nhập tên thiết bị...">
                                <small class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></small>
                            </div>
                        </div>

                        <div class="col-md-12">
                            <div class="form-group mb-4">
                                <label class="font-weight-bold"><i class="bi bi-image mr-1"></i> Hình ảnh thiết bị</label>
                                <input type="file" name="fileImage" class="form-control-file w-100">
                                <div th:if="${equipment.image != null}" class="mt-3 p-2 border rounded" style="width: fit-content; border-radius: 15px !important;">
                                    <img th:src="@{'/display-images/' + ${equipment.image}}"
                                         class="shadow-sm" style="height: 80px; border-radius: 10px;">
                                    <span class="small text-muted ml-2">Ảnh hiện tại</span>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="form-group mb-4">
                                <label><i class="bi bi-layers mr-1"></i> Loại (Type)</label>
                                <input type="text" th:field="*{type}" class="form-control" placeholder="VD: DEVICE,ROOM">
                                <small class="error" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></small>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="form-group mb-4">
                                <label><i class="bi bi-stack mr-1"></i> Số lượng tồn kho</label>
                                <input type="number" th:field="*{stock}" class="form-control" placeholder="0">
                                <small class="error" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></small>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end mt-4">
                        <a th:href="@{/admin/inventory}" class="btn btn-cancel mr-3">Hủy bỏ</a>
                        <button type="submit" class="btn btn-save">
                            <i class="bi bi-check2-circle mr-2"></i> Lưu dữ liệu
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
